<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack - Gestión de Finanzas Personales</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container glass-card auth-container">
        <div class="auth-header">
            <h1>Fin<span>Track</span></h1>
            <p>Tu futuro financiero comienza hoy.</p>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active" id="tab-login">Iniciar Sesión</button>
            <button class="tab-btn" id="tab-register">Registrarse</button>
        </div>

        <div class="auth-forms">
            <!-- Formulario de Login -->
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <label for="login-email">Correo Electrónico</label>
                    <input type="email" id="login-email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <div class="form-messages" id="login-message"></div>
                <button type="submit" class="btn btn-primary" id="btn-login">Ingresar</button>
            </form>

            <!-- Formulario de Registro -->
            <form id="register-form" class="auth-form" style="display: none;">
                <div class="input-group">
                    <label for="register-email">Correo Electrónico</label>
                    <input type="email" id="register-email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="input-group">
                    <label for="register-password">Contraseña</label>
                    <input type="password" id="register-password" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                <div class="form-messages" id="register-message"></div>
                <button type="submit" class="btn btn-secondary" id="btn-register">Crear Cuenta</button>
            </form>
        </div>
    </main>

    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
