<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FinTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dashboard-page">
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Barra de Navegación -->
    <nav class="navbar glass-card">
        <div class="nav-brand">Fin<span>Track</span></div>
        <div class="nav-user">
            <span id="user-email">Cargando...</span>
            <button id="btn-logout" class="btn btn-sm btn-outline">Cerrar Sesión</button>
        </div>
    </nav>

    <main class="dashboard-container">
        <!-- Tarjetas de Resumen -->
        <section class="summary-cards">
            <div class="card glass-card">
                <h3>Ingresos Totales</h3>
                <h2 id="total-income" class="text-success">$0.00</h2>
            </div>
            <div class="card glass-card">
                <h3>Gastos Totales</h3>
                <h2 id="total-expense" class="text-danger">$0.00</h2>
            </div>
            <div class="card glass-card highlight">
                <h3>Balance Actual</h3>
                <h2 id="total-balance">$0.00</h2>
            </div>
        </section>

        <!-- Formularios de Registro -->
        <section class="entry-forms">
            <div class="card glass-card form-section">
                <h3>Nuevo Ingreso</h3>
                <form id="form-income">
                    <div class="input-group">
                        <input type="text" id="inc-desc" placeholder="Descripción" required>
                    </div>
                    <div class="input-group">
                        <input type="number" id="inc-amount" placeholder="Monto" step="0.01" min="0.01" required>
                    </div>
                    <button type="submit" class="btn btn-success btn-full">Agregar Ingreso</button>
                </form>
            </div>

            <div class="card glass-card form-section">
                <h3>Nuevo Gasto</h3>
                <form id="form-expense">
                    <div class="input-group">
                        <input type="text" id="exp-desc" placeholder="Descripción" required>
                    </div>
                    <div class="input-group">
                        <input type="number" id="exp-amount" placeholder="Monto" step="0.01" min="0.01" required>
                    </div>
                    <button type="submit" class="btn btn-danger btn-full">Agregar Gasto</button>
                </form>
            </div>
        </section>

        <!-- Listas de Transacciones -->
        <section class="transactions-lists">
            <div class="card glass-card list-section">
                <h3>Últimos Ingresos</h3>
                <ul id="list-incomes" class="transaction-list">
                    <!-- Se llena con JS -->
                </ul>
            </div>

            <div class="card glass-card list-section">
                <h3>Últimos Gastos</h3>
                <ul id="list-expenses" class="transaction-list">
                    <!-- Se llena con JS -->
                </ul>
            </div>
        </section>
    </main>

    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
